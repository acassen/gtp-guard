!
hostname upf-sim
!
pdn
!
bpf-program upf-1
 path bin/upf.bpf
 no shutdown
!
interface upf
 bpf-program upf-1
 ip route table-id 1020
 no shutdown
!
ip pool upf-v4
 prefix 10.0.0.0/12
 no shutdown
!
ip pool upf-v6
 prefix 2a01:e00:6020::/44
 no shutdown
!
access-point-name boa
 ip pool upf-v4
 ip pool upf-v6
!
pfcp-router pfcp-1
 description first_one
 debug ingress_msg
 debug egress_msg
 node-id sut.example.com
 bpf-program upf-1
 listen 192.168.61.194 port 8805
 strict-apn
 gtpu-tunnel-endpoint all 192.168.61.1 port 2152
!
line vty
 no login
 listen 127.0.0.1 1664
!
end
